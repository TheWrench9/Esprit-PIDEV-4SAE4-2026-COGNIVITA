apiVersion: apps/v1
kind: Deployment
metadata:
  name: medication-adherence-service
  namespace: cognivita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medication-adherence-service
  template:
    metadata:
      labels:
        app: medication-adherence-service
    spec:
      containers:
        - name: medication-adherence-service
          image: monta2027/medication-adherence-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: DB_HOST
              value: "mysql-medical"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "alzheimer_adherence"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medical-records-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: EUREKA_HOST
              value: "eureka-server"
            - name: MEDICAL_RECORDS_URL
              value: "http://medical-records-service:8081"
