server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false
    # Reduce peer sync noise on single-node setup
    peer-node-connect-timeout-ms: 200
    peer-node-read-timeout-ms: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # Show full UP/DOWN details so the grep in health check always finds "UP"
      show-details: always
  health:
    defaults:
      enabled: true
