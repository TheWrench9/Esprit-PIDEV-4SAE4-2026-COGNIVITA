# ============================================
# ACTIVITIES SERVICE - Activit�s Cognitives Configuration
# ============================================

# Server
server.port=8087
server.servlet.context-path=/api
spring.application.name=activities-service

# Database - dedicated DB for activities service
spring.datasource.url=jdbc:mysql://localhost:3306/cognivita_activities_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.health-check-url-path=/actuator/health

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# LOGGING CONFIGURATION - AM�LIOR�E POUR D�BOGAGE
# ============================================

# Niveau global
logging.level.root=INFO

# Logs de l'application
logging.level.tn.esprit.cognivita=DEBUG

# Logs Spring Web pour voir les mappings
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# Logs pour voir les endpoints charg�s
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# Logs Eureka/Discovery
logging.level.com.netflix.discovery=INFO
logging.level.com.netflix.eureka=INFO

# Logs Hibernate/SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ============================================
# SWAGGER/OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

